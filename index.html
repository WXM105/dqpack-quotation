<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b3d91">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <title>DQ PACK报价计算器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa; /* 可替换为你的背景图：url("公司厂容.jpg") */
            background-size: cover;
            margin: 0;
            padding: 0;
        }

        #container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: auto;
        }

        #frame {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px; 
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"],
        select {
            width: calc(100% - 10px);
            padding: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result_label {
            margin-top: 10px;
            font-weight: bold;
        }

        .notice {
            color: red;
            font-weight: bold;
            text-align: center;
            display: block;
            margin-bottom: 10px;
        }

        .separator {
            display: block;
            text-align: center;
            margin: 10px 0;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
  <!-- =========================================================
       （可选）密码遮罩：目前保留注释状态
  ========================================================== -->
  <!--
  <div id="password-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%;
       background: rgba(0,0,0,0.5); z-index: 9999; display: flex; justify-content: center; align-items: center;">
    <div style="background: white; padding: 20px; border-radius: 10px; text-align: center;">
      <p><strong>请输入密码以继续访问：</strong></p>
      <input type="password" id="custom-password" placeholder="请输入密码" style="padding: 10px; width: 200px;"
             onkeydown="if (event.key === 'Enter') checkPassword();">
      <br><br>
      <button onclick="checkPassword()">确认</button>
    </div>
  </div>
  -->

  <!-- =========================================================
       页面容器
  ========================================================== -->
  <div id="container">
    <div id="frame">

      <!-- =========================================================
           顶部：计算类型切换（控制四个模块显示/隐藏）
      ========================================================== -->
      <div class="section">
        <label for="calculate_type_entry"><b>计算类型：</b></label>
        <select id="calculate_type_entry" onchange="toggleCalculationType()">
          <option value="制袋">制袋</option>
          <option value="卷膜">卷膜</option>
          <option value="卷膜张数">卷膜张数</option>
          <option value="卷数估算">卷数估算</option>
        </select>
        <br>
      </div>

      <!-- =========================================================
           模块 1：制袋（按“袋子尺寸 + 结构层 + 数量”报价）
      ========================================================== -->
      <div id="bagging_options">

        <!-- A）袋型与基础尺寸 -->
        <div class="section">
          <h3 style="margin: 10px 0 6px;">制袋 - 基础信息</h3>

          <label for="bag_type_select"><b>袋型选择：</b></label>
          <select id="bag_type_select">
            <!-- 元/个 -->
            <option value="0.03">三边封</option>
            <option value="0.06">四边封</option>
            <option value="0.03">中封袋</option>
            <option value="0.06">中封风琴袋</option>
            <option value="0.07">K型袋</option>
            <option value="0.06">R型袋</option>
            <option value="0.04">自立袋</option>
            <option value="0.08">自立吸嘴袋（普通嘴）</option>
            <option value="0.08">自立吸嘴袋（斜嘴）</option>
            <option value="0.04">自立冲孔袋</option>
            <option value="0.06">八边封袋</option>
            <option value="0.06">八边封吸嘴袋（普通嘴）</option>
            <option value="0.04">异形袋（普通）</option>
            <option value="0.04">异形袋吸嘴袋</option>
            <option value="0.08">咖啡袋</option>
            <option value="0.06">高温蒸煮袋</option>
            <option value="0.05">可回收袋</option>
          </select>
          <br>

          <label for="width_entry"><b>袋子的宽度（cm）：</b></label>
          <input type="text" id="width_entry" placeholder="请输入袋子的宽度">
          <br>

          <label for="height_entry"><b>袋子的长度（cm）：</b></label>
          <input type="text" id="height_entry" placeholder="请输入袋子的长度">
          <br>

          <label for="bottom_entry"><b>袋子的底部增加高度（cm）：</b></label>
          <label class="notice">无底请输入0（这里输入的是“单边底”，程序内部会×2）</label>
          <input type="text" id="bottom_entry" placeholder="无底请输入0（这里输入的是单边底）">
          <br>
        </div>

        <!-- B）印刷/版费（有印刷才显示） -->
        <div class="section">
          <h3 style="margin: 10px 0 6px;">制袋 - 印刷与版费</h3>

          <label for="print_mode_bag"><b>是否印刷：</b></label>
          <select id="print_mode_bag" onchange="togglePrintFields('bag')">
            <option value="print" selected>有印刷</option>
            <option value="none">无印刷</option>
          </select>
          <br>

          <!-- 有印刷时显示 -->
          <div id="bag_print_fields">
            <label class="notice">快算时不用输入此板块</label>
            <label for="color_count"><b>印刷颜色数：</b></label>
            <input type="text" id="color_count" placeholder="例如 4">
            <br>

            <label for="plate_fee_input"><b>每版费用：</b></label>
            <input type="text" id="plate_fee_input" placeholder="不填：默认按颜色数 × 700元（你的逻辑）">
            <br>

            <label for="plate_fee_currency"><b>版费币种：</b></label>
            <select id="plate_fee_currency">
              <option value="人民币">人民币</option>
              <option value="美元">美元</option>
            </select>
            <br>
          </div>
        </div>

        <!-- C）结构层（动态生成材料/厚度） -->
        <div class="section">
          <h3 style="margin: 10px 0 6px;">制袋 - 结构层</h3>

          <label for="num_layers"><b>选择层数：</b></label>
          <select id="num_layers" onchange="createLayerSelection()">
            <option value="" disabled selected hidden>请选择层数</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
          <br>

          <!-- 动态层容器（JS往这里塞每一层的材料/厚度） -->
          <div id="layer_selection"></div>

          <label for="quantity_entry"><b>订货数量（万个）：</b></label>
          <input type="text" id="quantity_entry" placeholder="请输入数量" value="5">
          <br>
        </div>

        <!-- D）附加项（保持你原来的黄色框，只是加注释和缩进） -->
        <div class="section" style="color: blue; font-size: 16px; background-color: yellow; border: 3px solid black; padding: 8px;">
          <h3 style="margin: 6px 0;">制袋 - 附加项</h3>

          <label for="coffee_valve_select"><b>咖啡阀</b></label>
          <select id="coffee_valve_select">
            <option value="0">无</option>
            <option value="0.15">A1</option>
            <option value="0.15">A2</option>
            <option value="0.22">A3</option>
            <option value="0.21">A4</option>
          </select>
          <br>

          <label for="zipper_checkbox"><b>拉链</b></label>
          <input type="checkbox" id="zipper_checkbox">
          <br>

          <label for="handcuffs_checkbox"><b>手扣</b></label>
          <input type="checkbox" id="handcuffs_checkbox">
          <br>

          <label for="mouthpiece_select"><b>吸嘴类型:</b></label>
          <select id="mouthpiece_select">
            <option value="0">无</option>
            <option value="0.05">5mm盖子</option>
            <option value="0.06">6mm盖子</option>
            <option value="0.082">8.2mm盖子</option>
            <option value="0.086">8.6mm蒸煮红色蘑菇盖</option>
            <option value="0.086">8.6mm旋盖</option>
            <option value="0.086">8.6mm盖子绿色375C</option>
            <option value="0.13">8.6mm蒸煮蘑菇盖</option>
            <option value="0.086">8.6mm普通盖子</option>
            <option value="0.086">8.6mmB1盖子</option>
            <option value="0.086">8.6mmA2盖子</option>
            <option value="0.086">8.6mmA3盖子</option>
            <option value="0.095">9.5mm盖子</option>
            <option value="0.096">9.6mm盖子</option>
            <option value="0.10">10mm盖子</option>
            <option value="0.13">13mm盖子</option>
            <option value="0.15">15mm盖子</option>
            <option value="0.16">16mm盖子</option>
            <option value="0.20">20mm盖子</option>
            <option value="0.22">22mm盖子</option>
            <option value="0.33">33mm盖子</option>
          </select>
          <br>

          <label for="groove_checkbox"><b>凹槽</b></label>
          <input type="checkbox" id="groove_checkbox">
          <br>

          <label for="fob_select"><b>FOB始发港</b></label>
          <select id="fob_select">
            <option value="">— 不计FOB —</option>
            <option value="汕头20柜" data-cost="1800">汕头20柜</option>
            <option value="汕头40柜" data-cost="2000">汕头40柜</option>
            <option value="深圳盐田20柜" data-cost="2300">深圳盐田20柜</option>
            <option value="深圳盐田40柜" data-cost="3300">深圳盐田40柜</option>
            <option value="深圳蛇口20柜" data-cost="2500">深圳蛇口20柜</option>
            <option value="深圳蛇口40柜" data-cost="3600">深圳蛇口40柜</option>
          </select>
          <br>

          <!-- CIF（制袋） -->
          <label>
            <input type="checkbox" id="cif_checkbox" onchange="toggleCIFBag()">
            <b>CIF</b>
          </label>
          <span id="cif_input_wrapper" style="display: none;">
            <input type="number" id="cif_input" placeholder="CIF总额">
          </span>
          <br>

          <label for="tax_checkbox"><b>含税</b></label>
          <input type="checkbox" id="tax_checkbox">
          <br>
        </div>

        <!-- E）报价参数：币种 / 汇率 / 利润率 -->
        <div class="section">
          <h3 style="margin: 10px 0 6px;">制袋 - 报价参数</h3>

          <label for="currency_entry"><b>报价币种：</b></label>
          <select id="currency_entry" onchange="toggleExchangeRate()">
            <option value="人民币">人民币</option>
            <option value="美元">美元</option>
          </select>
          <br>

          <label for="exchange_rate_entry" id="exchange_rate_label" style="display: none;"><b>美元兑人民币的汇率：</b></label>
          <input type="text" id="exchange_rate_entry" style="display: none;">
          <br>

          <label for="profit_margin_entry"><b>利润率：</b></label>
          <select id="profit_margin_entry">
            <option value="" disabled selected hidden>请选择利润率</option>
            <option value="1.0">成本</option>
            <option value="1.1">10%</option>
            <option value="1.2">20%</option>
            <option value="1.3">30%</option>
            <option value="1.4">40%</option>
            <option value="1.5">50%</option>
            <option value="1.6">60%</option>
            <option value="1.7">70%</option>
            <option value="1.8">80%</option>
            <option value="1.9">90%</option>
            <option value="2.0">100%</option>
          </select>
          <br>
        </div>

      </div><!-- /#bagging_options -->


      <!-- =========================================================
           模块 2：卷膜（按“卷规格”或“按尺寸换算”两种方式）
      ========================================================== -->
      <div id="filmprice_options" style="display: none;">

        <h3 style="margin: 10px 0 6px;">卷膜 - 基础信息</h3>

        <!-- A）卷膜计算方式切换 -->
        <label for="roll_calc_mode"><b>卷膜计算方式：</b></label>
        <select id="roll_calc_mode" onchange="toggleRollCalcMode()">
          <option value="spec" selected>按吨数/卷规格</option>
          <option value="size">按尺寸（客户给袋子尺寸，只要卷膜）</option>
        </select>
        <br>

        <!-- A1）按卷规格（原逻辑输入） -->
        <div id="roll_mode_spec">
          <label for="film_width"><b>展开宽度（cm）：</b></label>
          <input type="text" id="film_width" placeholder="例如 70" value="70">
          <br>

          <label for="film_length"><b>卷膜总长度（m）：</b></label>
          <input type="text" id="film_length" placeholder="例如 3000" value="3000">
          <br>

          <label><b>卷数（数量）：</b></label>
          <input type="number" id="film_count" value="15">
          <br>
        </div>

        <!-- A2）按尺寸（新增输入） -->
        <div id="roll_mode_size" style="display:none">
          <label><b>成品袋宽（cm）：</b></label>
          <input type="text" id="roll_bag_width_cm" placeholder="例如 12">
          <br>

          <label><b>成品袋高（cm）：</b></label>
          <input type="text" id="roll_bag_height_cm" placeholder="例如 18">
          <br>

          <label><b>底（cm）：</b></label>
          <label class="notice">无底请输入0（这里输入的是“单边底”，程序内部会×2）</label>
          <input type="text" id="roll_bag_bottom_cm" placeholder="例如 4.75">
          <br>

          <label><b>数量（个）：</b></label>
          <input type="number" id="roll_bag_qty" placeholder="例如 100000">
          <br>

          <label><b>侧封/搭接余量（cm）：</b></label>
          <input type="text" id="roll_side_allow_cm" value="0">
          <br>

          <label><b>上下封口/切刀余量（cm）：</b></label>
          <input type="text" id="roll_tb_allow_cm" value="0">
          <br>
        </div>

        <!-- B）印刷/版费（有印刷才显示） -->
        <div class="section">
          <h3 style="margin: 10px 0 6px;">卷膜 - 印刷与版费</h3>

          <label for="print_mode_roll"><b>是否印刷：</b></label>
          <select id="print_mode_roll" onchange="togglePrintFields('roll')">
            <option value="print" selected>有印刷</option>
            <option value="none">无印刷</option>
          </select>
          <br>

          <div id="roll_print_fields">
            <label class="notice">快算时不用输入此板块</label>
            <label for="color_count1"><b>印刷颜色数：</b></label>
            <input type="text" id="color_count1" placeholder="例如 4">
            <br>

            <label for="plate_fee_input1"><b>每版费用：</b></label>
            <input type="text" id="plate_fee_input1" placeholder="不填：默认按颜色数 × 700元">
            <br>

            <label for="plate_fee_currency1"><b>版费币种：</b></label>
            <select id="plate_fee_currency1">
              <option value="人民币">人民币</option>
              <option value="美元">美元</option>
            </select>
            <br>
          </div>
        </div>

        <!-- C）结构层（动态生成材料/厚度） -->
        <div class="section">
          <h3 style="margin: 10px 0 6px;">卷膜 - 结构层</h3>

          <label for="num_layers2"><b>选择层数：</b></label>
          <select id="num_layers2" onchange="createLayerSelection2()">
            <option value="" disabled selected hidden>请选择层数</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
          <br>

          <div id="layer_selection2"></div>
        </div>

        <!-- D）附加项（卷膜） -->
        <div class="section" style="color: blue; font-size: 16px; background-color: yellow; border: 3px solid black; padding: 8px;">
          <h3 style="margin: 6px 0;">卷膜 - 附加项</h3>

          <label for="rf_fob_select"><b>FOB始发港（卷膜）</b></label>
          <select id="rf_fob_select">
            <option value="">— 不计FOB —</option>
            <option value="汕头20柜" data-cost="1800">汕头20柜</option>
            <option value="汕头40柜" data-cost="2000">汕头40柜</option>
            <option value="深圳盐田20柜" data-cost="2300">深圳盐田20柜</option>
            <option value="深圳盐田40柜" data-cost="3300">深圳盐田40柜</option>
            <option value="深圳蛇口20柜" data-cost="2500">深圳蛇口20柜</option>
            <option value="深圳蛇口40柜" data-cost="3600">深圳蛇口40柜</option>
          </select>
          <br>

          <!-- CIF（卷膜） -->
          <label>
            <input type="checkbox" id="rf_cif_checkbox" onchange="toggleCIFRoll()">
            <b>CIF</b>
          </label>
          <span id="rf_cif_input_wrapper" style="display: none;">
            <input type="number" id="rf_cif_input" placeholder="CIF总额">
          </span>
          <br>

          <label for="tax_checkbox1"><b>含税</b></label>
          <input type="checkbox" id="tax_checkbox1">
          <br>
        </div>

        <!-- E）报价参数：币种 / 汇率 / 利润率 -->
        <div class="section">
          <h3 style="margin: 10px 0 6px;">卷膜 - 报价参数</h3>

          <label for="currency1_entry"><b>报价币种：</b></label>
          <select id="currency1_entry" onchange="toggleExchangeRate1()">
            <option value="人民币">人民币</option>
            <option value="美元">美元</option>
          </select>
          <br>

          <label for="exchange1_rate_entry" id="exchange1_rate_label" style="display: none;"><b>美元兑人民币的汇率：</b></label>
          <input type="text" id="exchange1_rate_entry" style="display: none;">
          <br>

          <label for="profit_margin_entry1"><b>利润率：</b></label>
          <select id="profit_margin_entry1">
            <option value="" disabled selected hidden>请选择利润率</option>
            <option value="1.0">成本</option>
            <option value="1.1">10%</option>
            <option value="1.2">20%</option>
            <option value="1.3">30%</option>
            <option value="1.4">40%</option>
            <option value="1.5">50%</option>
            <option value="1.6">60%</option>
            <option value="1.7">70%</option>
            <option value="1.8">80%</option>
            <option value="1.9">90%</option>
            <option value="2.0">100%</option>
          </select>
          <br>
        </div>

      </div><!-- /#filmprice_options -->


      <!-- =========================================================
           模块 3：卷膜张数（保持你原 UI，主要是字段分组更清晰）
      ========================================================== -->
      <div id="finalSheets_options" style="display: none;">
        <h3 style="margin: 10px 0 6px;">卷膜张数 - 计算输入</h3>

        <label for="width_entry1"><b>袋子的宽度（cm）：</b></label>
        <input type="text" id="width_entry1" placeholder="请输入袋子的宽度">
        <br>

        <label for="height_entry1"><b>袋子的长度（cm）：</b></label>
        <input type="text" id="height_entry1" placeholder="请输入袋子的长度">
        <br>

        <label for="bottom_entry1"><b>袋子的底部增加高度（cm）：</b></label>
        <label class="notice">无底请输入0（这里输入的是“单边底”，程序内部会×2）</label>
        <input type="text" id="bottom_entry1" placeholder="无底请输入0（单边底）">
        <br>

        <label for="film_length_entry"><b>膜的长度（m）：</b></label>
        <input type="text" id="film_length_entry" placeholder="请输入膜的长度">
        <br>

        <label for="film_width_entry"><b>膜的宽度（cm）：</b></label>
        <input type="text" id="film_width_entry" placeholder="请输入膜的宽度">
        <br>
      </div><!-- /#finalSheets_options -->


      <!-- =========================================================
           模块 4：卷数估算（保持你原 UI）
      ========================================================== -->
      <div id="rollCountEstimate_options" style="display: none;">
        <h3 style="margin: 10px 0 6px;">卷数估算 - 计算输入</h3>

        <label for="total_weight_input"><b>总重量（kg）：</b></label>
        <input type="text" id="total_weight_input" placeholder="例如 500">
        <br>

        <label for="film_width_input"><b>膜展开宽度（cm）：</b></label>
        <input type="text" id="film_width_input" placeholder="例如 70">
        <br>

        <label for="roll_length_input"><b>每卷长度（m）：</b></label>
        <input type="text" id="roll_length_input" placeholder="例如 3000">
        <br>

        <label for="num_layers_roll"><b>选择层数：</b></label>
        <select id="num_layers_roll" onchange="createLayerSelectionRoll()">
          <option value="" disabled selected hidden>请选择层数</option>
          <option value="1">1</option>

/* =============================================================================
   D. 主计算：calculateFinalPrice（制袋 / 卷膜 / 卷膜张数 / 卷数估算）
   说明：此处不做“逻辑改写”，仅加注释，保持你现有计算方式
============================================================================= */

function calculateFinalPrice() {
  let calculationType = document.getElementById("calculate_type_entry").value;

  /* -----------------------------
     D1. 制袋（元/个）
  ----------------------------- */
  if (calculationType === "制袋") {

    // 基础尺寸/数量
    let height = parseFloat(document.getElementById('height_entry').value);
    let bottom = parseFloat(document.getElementById('bottom_entry').value);
    let width  = parseFloat(document.getElementById('width_entry').value);
    let quantity = parseFloat(document.getElementById('quantity_entry').value) * 10000;

    // 印刷模式（有/无）
    let printModeBag = document.getElementById('print_mode_bag')?.value || "print";

    // 版费：颜色数 / 手输 / 币种换算（无印刷时强制为0）
    let colorCount = parseInt(document.getElementById('color_count').value || "0");
    let exchangeRateBag = parseFloat(document.getElementById('exchange_rate_entry').value || "7");
    let plateFeeManual = parseFloat(document.getElementById('plate_fee_input').value || "0");
    let plateFeeCurrency = document.getElementById('plate_fee_currency').value;

    let plateFeeTotal = 0;
    if (printModeBag === "none") {
      plateFeeTotal = 0;
    } else {
      if (!isNaN(plateFeeManual) && plateFeeManual > 0) {
        plateFeeTotal = plateFeeManual;
        if (plateFeeCurrency === "美元") plateFeeTotal *= exchangeRateBag;
      } else {
        plateFeeTotal = colorCount * 700;
      }
    }

    let plateFeePerBag = quantity > 0 ? (plateFeeTotal / quantity) : 0;

    // 利润率
    let profitMargin = parseFloat(document.getElementById('profit_margin_entry').value);

    // 动态层：密度、厚度、（材料+工序）元/kg
    let density = densityEntries.map(entry => parseFloat(entry.value));
    let thickness = thicknessEntries.map(entry => parseFloat(entry.value));
    let layerCostPerKgArr = materialCostEntries.map(entry => parseFloat(entry.value));

    // 制袋工费（袋型下拉）
    let bagCost = parseFloat(document.getElementById('bag_type_select').value) || 0;

    // 1) 材料+工序成本（按每袋重量×元/kg）
    let totalMaterialCost = density.reduce((total, d, index) => {
      if (isNaN(d)) return total;
      const t = thickness[index];
      const costPerKg = layerCostPerKgArr[index] || 0;
      if (isNaN(t) || isNaN(costPerKg)) return total;

      const areaM2 = 2 * width * (height + bottom * 2) * 0.0001;
      const layerWeightKg = t * d * areaM2 / 1000;
      return total + layerWeightKg * costPerKg;
    }, 0);

    // 2) 附加项（咖啡阀/拉链/手扣/吸嘴/凹槽/FOB/CIF）按“每袋”计
    let additionalCosts = 0;
    additionalCosts += parseFloat(document.getElementById('coffee_valve_select').value || "0");

    if (document.getElementById('zipper_checkbox').checked) {
      additionalCosts += 0.085 * (width * 0.01) * 2;
    }
    if (document.getElementById('handcuffs_checkbox').checked) {
      additionalCosts += 0.13;
    }
    additionalCosts += parseFloat(document.getElementById('mouthpiece_select').value || "0");
    if (document.getElementById('groove_checkbox').checked) {
      additionalCosts += 0.01;
    }

    // FOB（制袋）：按票->按数量分摊
    (function () {
      const sel = document.getElementById('fob_select');
      if (!sel || !sel.value) return;
      const costCNY = parseFloat(sel.selectedOptions[0].dataset.cost || '0') || 0;
      if (quantity > 0 && costCNY > 0) additionalCosts += (costCNY / quantity);
    })();

    // CIF（制袋）：输入约定为人民币->按数量分摊
    (function () {
      const cifCheckbox = document.getElementById('cif_checkbox');
      if (!cifCheckbox || !cifCheckbox.checked) return;
      const cifVal = parseFloat(document.getElementById('cif_input').value || '0');
      if (!cifVal) return;
      if (quantity > 0) additionalCosts += (cifVal / quantity);
    })();

    // 3) 总重量（kg），用于分切费 & 显示“单袋重量”
    let totalWeight = 0; // g
    for (let i = 0; i < density.length; i++) {
      let d = density[i];
      let t = thickness[i];
      if (isNaN(d) || isNaN(t)) continue;
      const layerWeightPerBag_g = t * d * 2 * width * (height + bottom * 2) * 0.0001;
      totalWeight += layerWeightPerBag_g * quantity;
    }
    let totalWeightKg = totalWeight / 1000;
    let weightPerBag_g = quantity > 0 ? (totalWeight / quantity) : 0;

    // 分切成本（元/袋）
    let slittingCostPerBag = 0;
    if (quantity > 0 && totalWeightKg > 0) {
      slittingCostPerBag = (totalWeightKg * SLITTING_COST_PER_KG) / quantity;
    }

    // 版费摊销（显示用）
    let plateFeePerKg = totalWeightKg > 0 ? (plateFeeTotal / totalWeightKg) : 0;

    // 4) 汇总（含税/币种）
    let taxMultiplierBag = document.getElementById('tax_checkbox').checked ? 1.13 : 1.0;
    let costPerBagRMB = ((totalMaterialCost + plateFeePerBag) * profitMargin
      + additionalCosts
      + slittingCostPerBag
      + bagCost) * taxMultiplierBag;

    let currency = document.getElementById('currency_entry').value;
    let exchangeRateForShow = parseFloat(document.getElementById('exchange_rate_entry').value || "7");
    let unitLabel = currency === "人民币" ? "¥/个" : "$/个";
    let amountLabel = currency === "人民币" ? "¥" : "$";
    let plateLabel = currency === "人民币" ? "元/kg" : "$/kg";

    if (currency === "美元") {
      costPerBagRMB = exchangeRateForShow ? (costPerBagRMB / exchangeRateForShow) : 0;
    }

    let totalAmount = costPerBagRMB * quantity;

    document.getElementById('result_label').innerHTML =
      "单个袋子重量：" + weightPerBag_g.toFixed(2) + " g/个<br>" +
      "总重量约为：" + totalWeightKg.toFixed(2) + " kg<br>" +
      "版费摊销：" + plateFeePerKg.toFixed(2) + " " + plateLabel + "<br>" +
      "制袋价格（单价）：" + costPerBagRMB.toFixed(5) + unitLabel + "<br>" +
      "<b>制袋总额</b>：" + amountLabel + totalAmount.toFixed(2);

    return;
  }

  /* -----------------------------
     D2. 卷膜（元/kg）
  ----------------------------- */
  else if (calculationType === "卷膜") {

    // 计算方式：spec（卷规格）/ size（按尺寸换算）
    const rollMode = document.getElementById('roll_calc_mode')?.value || 'spec';
    let area = 0;

    if (rollMode === 'spec') {
      let width = parseFloat(document.getElementById("film_width").value) / 100;
      let length = parseFloat(document.getElementById("film_length").value);
      let rollCount = parseInt(document.getElementById("film_count").value);
      area = width * length * rollCount;
    } else {
      const W = parseFloat(document.getElementById('roll_bag_width_cm').value || "0");
      const H = parseFloat(document.getElementById('roll_bag_height_cm').value || "0");
      const B = parseFloat(document.getElementById('roll_bag_bottom_cm').value || "0");
      const Q = parseFloat(document.getElementById('roll_bag_qty').value || "0");
      const sideAllow = parseFloat(document.getElementById('roll_side_allow_cm').value || "0");
      const tbAllow = parseFloat(document.getElementById('roll_tb_allow_cm').value || "0");

      const filmWidth_cm = 2 * W + sideAllow;
      const unitLen_cm = H + (2 * B) + tbAllow;
      area = (filmWidth_cm / 100) * (unitLen_cm / 100) * Q;
    }

    // 动态层：密度、厚度、材料单价（元/kg）
    let density = densityEntries2.map(entry => parseFloat(entry.value));
    let thickness = thicknessEntries2.map(entry => parseFloat(entry.value));
    let matCostArr = materialCostEntries2.map(entry => parseFloat(entry.value));

    // 汇率/币种/利润/含税
    let exchangeRate = parseFloat(document.getElementById("exchange1_rate_entry").value || "7");
    let currency = document.getElementById('currency1_entry').value;
    let profitMargin = parseFloat(document.getElementById('profit_margin_entry1').value || "1");
    let taxMultiplier = document.getElementById('tax_checkbox1').checked ? 1.13 : 1.0;

    // 印刷模式：有/无
    let printModeRoll = document.getElementById('print_mode_roll')?.value || "print";

    // 版费：颜色数 / 手输 / 币种换算（无印刷时强制为0）
    let colorCount = parseInt(document.getElementById("color_count1").value) || 0;
    let plateFeeManual = parseFloat(document.getElementById("plate_fee_input1").value || "0");
    let plateFeeCurrency = document.getElementById("plate_fee_currency1").value;

    let plateFeeTotal = 0;
    if (printModeRoll === "none") {
      plateFeeTotal = 0;
    } else {
      if (!isNaN(plateFeeManual) && plateFeeManual > 0) {
        plateFeeTotal = plateFeeManual;
        if (plateFeeCurrency === "美元") plateFeeTotal *= exchangeRate;
      } else {
        plateFeeTotal = colorCount * 700;
      }
    }

    // -------- 1) 计算卷膜总重量（kg）--------
    // 面积 area（m²）× 厚度(μm) × 密度(g/cm³) = g/m²；再换算 kg
    let totalWeightKg = density.reduce((sumKg, d, idx) => {
      const t = thickness[idx];
      if (isNaN(d) || isNaN(t)) return sumKg;
      const gsm = t * d; // g/m²
      return sumKg + (area * gsm) / 1000; // kg
    }, 0);

    // -------- 2) 材料成本（元）--------
    let materialCostTotal = density.reduce((sum, d, idx) => {
      const t = thickness[idx];
      const costPerKg = matCostArr[idx] || 0;
      if (isNaN(d) || isNaN(t) || isNaN(costPerKg)) return sum;

      const layerWeightKg = (area * (t * d)) / 1000;
      return sum + layerWeightKg * costPerKg;
    }, 0);

    // -------- 3) 卷膜工序成本（元）--------
     // —— 印刷成本（第一层）——
let printingCost = (printModeRoll === 'none') ? 0 : (firstLayerWeightKg * ROLL_PRINTING_COST_PER_KG);


    // —— 复合/自动包装 ——
    // 规则：
    // 若层材料 = AL → 10000 元/吨 = 10 元/kg
    // 否则 → 普通复合 + 自动包装 = 5000 元/吨 = 5 元/kg

    let laminationCost = 0;
    for (let i = 1; i < density.length; i++) { // 从第二层开始，i 是数组下标（0 基）
        const w = layerWeightKgArr[i];
        // 第 i+1 层的材料选择框 id = material_select2_层号
        const sel = document.getElementById('material_select2_' + (i + 1));
        const material = sel ? sel.value : "";

        if (material === "AL") {
            // 卷膜 AL 层复合：10000 元/吨 = 10 元/kg
            laminationCost += w * ROLL_LAM_AL_COST_PER_KG;
        } else {
            // 其他层：复合 + 自动包装：5000 元/吨 = 5 元/kg
            laminationCost += w * ROLL_LAM_AUTO_COST_PER_KG;
        }
    }
        // —— 分切成本：所有层总重量 —— 
    let slittingCost = totalWeightKg * ROLL_SLITTING_COST_PER_KG; // 1 元/kg

    // —— 卷膜总加工费用（人民币）——
    let processingCost = printingCost + laminationCost + slittingCost;


    // -------- 4) 版费摊销（按kg展示）--------
    let plateFeePerKg = totalWeightKg > 0 ? (plateFeeTotal / totalWeightKg) : 0;

    // -------- 5) FOB/CIF（卷膜：按“总额”加到最后）--------
    let additionalAmount = 0;

    // 卷膜 FOB：下拉里带 data-cost（人民币），直接加到总额
    (function () {
      const sel = document.getElementById('rf_fob_select');
      if (!sel || !sel.value) return;
      const costCNY = parseFloat(sel.selectedOptions[0].dataset.cost || '0') || 0;
      additionalAmount += costCNY;
    })();

    // 卷膜 CIF：手输人民币
    (function () {
      const cifCheckbox = document.getElementById('rf_cif_checkbox');
      if (!cifCheckbox || !cifCheckbox.checked) return;
      const cifVal = parseFloat(document.getElementById('rf_cif_input').value || '0');
      if (!cifVal) return;
      additionalAmount += cifVal;
    })();

    // -------- 6) 汇总：得到元/kg & 总额--------
    // 你的卷膜是“先算总成本，再除以kg得到单价”
    let totalCostRMB =
      (materialCostTotal + printingCostTotal + laminationCostTotal + slittingCostTotal + plateFeeTotal) * profitMargin * taxMultiplier
      + additionalAmount;

    let unitCostRMBPerKg = totalWeightKg > 0 ? (totalCostRMB / totalWeightKg) : 0;

    // 币种显示（美元则整体换算）
    let unitLabel = currency === "人民币" ? "¥/kg" : "$/kg";
    let amountLabel = currency === "人民币" ? "¥" : "$";
    let plateLabel = currency === "人民币" ? "元/kg" : "$/kg";

    let totalAmountShow = totalCostRMB;
    let unitCostShow = unitCostRMBPerKg;
    let plateFeePerKgShow = plateFeePerKg;

    if (currency === "美元") {
      unitCostShow = exchangeRate ? (unitCostRMBPerKg / exchangeRate) : 0;
      totalAmountShow = exchangeRate ? (totalCostRMB / exchangeRate) : 0;
      plateFeePerKgShow = exchangeRate ? (plateFeePerKg / exchangeRate) : 0;
    }

    // -------- 6.5) 计算 1㎡ 单价 --------
    let unitPriceRMBPerM2 = area > 0 ? (totalCostRMB / area) : 0;

    let unitPricePerM2Show = unitPriceRMBPerM2;

    // 美元显示换算
    if (currency === "美元") {
      unitPricePerM2Show = exchangeRate ? (unitPriceRMBPerM2 / exchangeRate) : 0;

    document.getElementById("result_label").innerHTML =

    (currency === "人民币" ? " ¥/㎡" : " $/㎡") + "<br>" +

  /* -----------------------------
     D3. 卷膜张数（估算：按卷膜宽/长/张长/数量）
     说明：这一块保持你原来的“张数换算”逻辑
  ----------------------------- */
  else if (calculationType === "卷膜张数") {
  // 读取你 UI 现有的 id（单位：cm / m）
  const W = parseFloat(document.getElementById("width_entry1").value || "0");        // 袋宽 cm
  const H = parseFloat(document.getElementById("height_entry1").value || "0");       // 袋高 cm
  const B = parseFloat(document.getElementById("bottom_entry1").value || "0");       // 底 cm（单边）
  const filmLenM = parseFloat(document.getElementById("film_length_entry").value || "0"); // 卷膜长度 m
  const filmWidthCm = parseFloat(document.getElementById("film_width_entry").value || "0"); // 卷膜宽 cm

  if (W <= 0 || H <= 0 || filmLenM <= 0 || filmWidthCm <= 0) {
    document.getElementById("result_label").innerHTML =
      "请填写：袋宽、袋高、膜长度、膜宽（底无则填0）。";
    return;
  }

  // 这里用一个“通用估算逻辑”
  // 单个袋子的走料长度（cm）：袋高 + 2*底（你UI提示底是单边）
  const pitchCm = H + 2 * B;

  // 横向排版：卷膜宽 / (2*袋宽) 估算（背封/对折类常用；只是估算）
  const across = Math.max(1, Math.floor(filmWidthCm / (2 * W)));

  // 纵向：总长(cm) / 走料(cm)
  const totalLenCm = filmLenM * 100;
  const along = Math.floor(totalLenCm / pitchCm);

  const totalPieces = across * along;

  document.getElementById("result_label").innerHTML =
    "走料长度（估算）：" + pitchCm.toFixed(2) + " cm/个<br>" +
    "横向排数（估算）：" + across + "<br>" +
    "纵向个数（估算）：" + along + "<br>" +
    "<b>预计总张数/个数：</b>" + totalPieces;

}

  /* -----------------------------

  ----------------------------- */
  else if (calculationType === "卷数估算") {

  if (totalWeightKg <= 0 || filmWidthCm <= 0 || rollLenM <= 0) {
    document.getElementById("result_label").innerHTML =
      "请填写：总重量（kg）、膜展开宽度（cm）、每卷长度（m）。";
    return;
  }

  // 结构总克重 gsm = Σ(厚度μm × 密度g/cm³)  → g/m²
  let gsm = 0;
  for (let i = 0; i < thicknessEntriesRoll.length; i++) {
    const t = parseFloat(thicknessEntriesRoll[i].value || "0"); // μm
    const dInput = densityEntriesRoll[i];
    const d = parseFloat(dInput?.value || "0"); // g/cm³
    if (t > 0 && d > 0) gsm += (t * d);
  }

  if (gsm <= 0) {
    document.getElementById("result_label").innerHTML =
      "请先选择每层材料，并填写每层厚度（μm）。";
    return;
  }

  // 单卷面积 m² = 宽(m) × 长(m)
  const areaPerRoll = (filmWidthCm / 100) * rollLenM;

  // 单卷重量 kg = 面积 × gsm(g/m²) / 1000
  const weightPerRollKg = (areaPerRoll * gsm) / 1000;

  if (weightPerRollKg <= 0) {
    document.getElementById("result_label").innerHTML = "参数异常：单卷重量计算为0，请检查输入。";
    return;
  }

  // 卷数 = 总重量 / 单卷重量
  const rollCount = totalWeightKg / weightPerRollKg;

  document.getElementById("result_label").innerHTML =
    "结构总克重（gsm）：" + gsm.toFixed(2) + " g/m²<br>" +
    "单卷面积：" + areaPerRoll.toFixed(2) + " m²<br>" +
    "单卷重量：" + weightPerRollKg.toFixed(2) + " kg/卷<br>" +
    "<b>预计卷数：</b>" + rollCount.toFixed(2) + " 卷";
  return;
}
}
